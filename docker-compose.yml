services:
  nyancat:
    build: .
    image: nyan-cat:latest
    network_mode: host
    shm_size: "512m"
    environment:
      - PYTHONPATH=/app
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - PATH=/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=16379
      - LANGUAGETOOL_HOST=127.0.0.1
      - LANGUAGETOOL_PORT=8010
      - GUNICORN_BIND=127.0.0.1:15000
    volumes:
      - lt-added:/app/lt-added
      - /usr/builtin/etc/certificate:/app/ssl
      - /share/Docker/NyanCAT/fileproject:/app/fileproject
      - /share/Docker/NyanCAT/database:/app/database
      - /share/Docker/NyanCAT/proxies.txt:/app/proxies.txt
    tty: true
    depends_on:
      - redis
      - languagetool

  celery-worker-pretranslate:
    image: nyan-cat:latest
    container_name: celery-worker-pretranslate
    network_mode: host
    depends_on:
      - nyancat
      - redis
    environment:
      - PYTHONPATH=/app
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - PATH=/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=16379
      - LANGUAGETOOL_HOST=127.0.0.1
      - LANGUAGETOOL_PORT=8010
      - CELERY_QUEUE=pretranslate
    command: >
      celery -A app.celery worker
      --loglevel=info
      --concurrency=2
      --prefetch-multiplier=1
      -Q pretranslate
    volumes:
      - /usr/builtin/etc/certificate:/app/ssl
      - /share/Docker/NyanCAT/fileproject:/app/fileproject
      - /share/Docker/NyanCAT/database:/app/database
      - /share/Docker/NyanCAT/proxies.txt:/app/proxies.txt
      - lt-added:/app/lt-added

  celery-worker-proxy:
    image: nyan-cat:latest
    container_name: celery-worker-proxy
    network_mode: host
    depends_on:
      - nyancat
      - redis
    environment:
      - PYTHONPATH=/app
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - PATH=/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=16379
      - LANGUAGETOOL_HOST=127.0.0.1
      - LANGUAGETOOL_PORT=8010
      - CELERY_QUEUE=proxyupdate
    command: >
      celery -A app.celery worker
      --loglevel=info
      --concurrency=1
      --prefetch-multiplier=1
      -Q proxyupdate
    volumes:
      - /usr/builtin/etc/certificate:/app/ssl
      - /share/Docker/NyanCAT/fileproject:/app/fileproject
      - /share/Docker/NyanCAT/database:/app/database
      - /share/Docker/NyanCAT/proxies.txt:/app/proxies.txt
      - lt-added:/app/lt-added

  celery-beat:
    image: nyan-cat:latest
    container_name: celery-beat
    network_mode: host
    depends_on:
      - redis
    environment:
      - PYTHONPATH=/app
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - PATH=/opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=16379
      - LANGUAGETOOL_HOST=127.0.0.1
      - LANGUAGETOOL_PORT=8010
    command: >
      celery -A app.celery beat
      --loglevel=info
    volumes:
      - /usr/builtin/etc/certificate:/app/ssl
      - /share/Docker/NyanCAT/fileproject:/app/fileproject
      - /share/Docker/NyanCAT/database:/app/database
      - /share/Docker/NyanCAT/proxies.txt:/app/proxies.txt
      - lt-added:/app/lt-added

  nginx:
    image: nginx:latest
    container_name: nyan-cat-nginx
    network_mode: host
    volumes:
      - /volume1/Docker/Nyan-CAT/nginx.conf:/etc/nginx/nginx.conf:ro
      - /usr/builtin/etc/certificate:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - nyancat

  redis:
    image: redis:7-alpine
    container_name: redis-stack-server
    network_mode: host
    command: >
      redis-server
      --bind 127.0.0.1
      --port 16379
    volumes:
      - redis-data:/data

  languagetool:
    image: erikvl87/languagetool:latest
    container_name: languagetool
    network_mode: host
    environment:
      - Java_Xms=128m
      - Java_Xmx=256m
    volumes:
      - lt-added:/lt-added
    user: root
    command: >
      bash -c "cp -r /LanguageTool/org/languagetool/resource/* /lt-added &&
               chmod 777 /LanguageTool/start.sh &&
               /LanguageTool/start.sh --port 8010"

volumes:
  nginx-logs:
  redis-data:
  lt-added: